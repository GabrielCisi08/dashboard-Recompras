const norm = s => String(s||"").toUpperCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();

const HABITE_SE = {};
Object.entries(HABITE_SE_RAW).forEach(([k,v]) => { HABITE_SE[norm(k)] = v; });

const extractEmp = chave => norm(String(chave||"")
  .replace(/\s+[A-Za-z0-9]{1,3}\s*-\s*\d+.*$/,"")   // " U-0202", " 1-0202", " 2-0202", " A-0202"
  .replace(/\s+U\s*-?\s*\d+.*$/i,"")                // fallback "U0202" / "U 0202"
  .trim());

// Dias desde o habite-se (null se não for transferência ou sem data)
const diasHabitse = row => {
  const tipo = (row["Recompra/ Transf"]||"").toUpperCase();
  if (!tipo.includes("TRANSFER")) return null;
  const hsStr = HABITE_SE[extractEmp(row["CHAVE PRODUTO"])];
  if (!hsStr) return null;
  return Math.floor((new Date() - new Date(hsStr)) / 86400000);
};

// Repasse "resolvido" = assinado / registrado / finalizado
const repasseResolvido = s => {
  const u = String(s||"").toUpperCase();
  return u.includes("ASSINADO") || u.includes("REGISTRADO") || u.includes("FINALIZADO");
};

// Receita REAL: contratos com repasse finalizado-ok / registrado / venda direta
const repasseReceita = s => {
  const u = String(s||"").toUpperCase();
  return u.includes("FINALIZADO")
      || u.includes("REGISTRADO")
      || u.includes("VENDA DIRETA");
};

// REGRA: transferência com habite-se > 180d E repasse não-resolvido → Viabilizar Recompra
const isViabilizarRecompra = row => {
  const dias = diasHabitse(row);
  if (dias === null || dias <= 180) return false;
  return !repasseResolvido(row["STATUS REPASSE"]);
};

const parseNum = v => {
  if (v==null) return 0;
  const s=String(v).replace(/R\$\s*/g,"").replace(/\s+/g,"").replace(/\./g,"").replace(",",".");
  const n=parseFloat(s); return isNaN(n)?0:n;
};
const fmtBRL = n => {
  const a=Math.abs(n), s=n<0?"-":"";
  if(a>=1_000_000) return `${s}R$ ${(a/1_000_000).toFixed(1).replace(".",",")}M`;
  if(a>=1_000)     return `${s}R$ ${Math.round(a/1_000).toLocaleString("pt-BR")}K`;
  return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}).format(n);
};
const pct = (a,b) => b===0?0:Math.round((a/b)*100);

const catDeb = (s="") => {
  const l=s.toLowerCase();
  if(l.includes("registrado")||l.includes("averbado")) return "Registrado / Averbado";
  if(l.includes("registro")) return "Em Registro";
  if(l.includes("procura"))  return "Procuração Assinada";
  return s.trim()||"Sem Info";
};
const catVen = (s="") => {
  const u=s.toUpperCase();
  if(!s.trim()) return "Sem Status";
  if(u.includes("SV - VALIDADO")||(u.includes("VENDA")&&u.includes("VALIDADO"))) return "SV Validado";
  if(u.includes("ESTEIRA"))         return "Esteira Crédito";
  if(u.includes("DESIST"))          return "Desistência";
  if(u.includes("PROCESSO JUDICIAL")) return "Proc. Judicial";
  if(u.includes("TRANSF")&&u.includes("LIBER")) return "Transf. Liberada";
  if(u.includes("ANALISANDO"))      return "Analisando Contrato";
  if(u.includes("CCA"))             return "Em Análise CCA";
  if(u.includes("ESTOQUE")||u.includes("PRONTOS")) return "Estoque";
  if(u.includes("FORA DE VENDA"))   return "Fora de Venda";
  if(u.includes("PROPOSTA"))        return "Proposta Comercial";
  if(u.includes("NA SV"))           return "Sem Status Comercial";
  return "Em Negociação";
};
const catRep = (s="") => {
  const u=s.toUpperCase();
  if(!s.trim()) return "Pendente";
  if(u.includes("FINALIZADO")||u.includes("GARANTIA")) return "Finalizado / Garantia";
  if(u.includes("VENDA DIRETA"))  return "Venda Direta";
  if(u.includes("DISTRATO")&&(u.includes("CONCLU")||u.includes("CONCLUÍ"))) return "Distrato Concluído";
  if(u.includes("DISTRATO"))      return "Em Distrato";
  if(u.includes("INCONFORME"))    return "Inconforme";
  if(u.includes("ASSINADO")||u.includes("CARTORI")) return "Assinado / Cartório";
  if(u.includes("CONFORME"))      return "Em Conformidade";
  if(u.includes("SUBIR"))         return "Subir p/ CEHOP";
  if(u.includes("NEGOCI"))        return "Em Negociação";
  if(u.includes("REGISTRADO"))    return "Registrado";
  if(u.includes("ANALISE")||u.includes("ANÁLISE")||u.includes("AGUARD")||u.includes("BRADESCO")||u.includes("CEHOP")) return "Em Análise";
  if(u.includes("REAVALIAR"))     return "Reavaliar";
  return "Pendente";
};

/* ─── KPI BANNER ─────────────────────────────────────────────────────────── */
function KPIBanner({kpis,nRec,nTrf,total}) {
  const taxaRealizacao = kpis.receitaPrevista>0
    ? Math.round((kpis.receitaReal/kpis.receitaPrevista)*100) : 0;
  const blocks = [
    {label:"Total de Processos", value:total, sub:`${nRec} recompras · ${nTrf} transf.`, color:T.txt},
    {label:"Valor Gasto Total",  value:fmtBRL(kpis.totalCustas), sub:"Custos já pagos — desembolsado", color:T.amber},
    {label:"Receita Prevista",   value:fmtBRL(kpis.receitaPrevista), sub:"Líquida — transf. deduz saldo CEF", color:T.txt},
    {label:"Receita Real",       value:fmtBRL(kpis.receitaReal),
      sub:`${taxaRealizacao}% realizada · finalizado · registrado · venda direta`, color:T.green},
  ];
  return (
    <div style={{display:"flex",gap:16,marginBottom:22,flexWrap:"wrap"}}>
      {blocks.map(({label,value,sub,color},i) => (
        <div key={i} style={{flex:1,minWidth:230,
            background:T.card,border:`1px solid ${T.border}`,
            borderTop:`3px solid ${color===T.txt?T.red:color}`,
            borderRadius:10,padding:"18px 20px",textAlign:"center",
            boxShadow:"0 1px 5px #00000010"}}>
          <div style={{color:T.sub,fontSize:10,fontWeight:700,textTransform:"uppercase",
              letterSpacing:"0.08em",marginBottom:9}}>{label}</div>
          <div style={{color,fontSize:24,fontWeight:800,lineHeight:1,
              whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums"}}>{value}</div>
          <div style={{color:T.sub,fontSize:11,marginTop:8}}>{sub}</div>
        </div>
      ))}
    </div>
  );
}

/* ─── PIPELINE CARD ──────────────────────────────────────────────────────── */
function PipelineCard({title,data,map}) {
  const total=data.reduce((s,d)=>s+d.value,0);
  return (
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,
        overflow:"hidden",flex:1,minWidth:265,boxShadow:"0 1px 5px #00000010"}}>
      <div style={{background:T.red,padding:"9px 16px",borderBottom:`2px solid ${T.redDk}`}}>
        <span style={{color:"#fff",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</span>
      </div>
      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {data.map(({name,value})=>{
          const p=pct(value,total), c=map[name]||T.sub;
          return (
            <div key={name}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <span style={{color:T.txt,fontSize:12}}>{name}</span>
                <span style={{color:c,fontSize:12,fontWeight:800,fontVariantNumeric:"tabular-nums"}}>
                  {value}<span style={{color:T.sub,fontWeight:400,fontSize:11}}> ({p}%)</span>
                </span>
              </div>
              <div style={{height:4,background:"#ede5e5",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${p}%`,background:c,borderRadius:2,
                    transition:"width 0.55s cubic-bezier(.4,0,.2,1)"}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── SECTION HEADER ROW ─────────────────────────────────────────────────── */
function SectionRow({label,count,isRec}) {
  const c = isRec ? T.red : T.purple;
  return (
    <tr>
      <td colSpan={7} style={{padding:"7px 14px",
          background: isRec ? "#fdf0f0" : "#f5f0fd",
          borderBottom:`1px solid ${T.border}`,borderTop:`2px solid ${c}`}}>
        <span style={{color:c,fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>
        <span style={{color:T.sub,fontSize:11,fontWeight:400,marginLeft:10}}>
          {count} {count===1?"processo":"processos"}
        </span>
      </td>
    </tr>
  );
}

/* ─── MAIN ───────────────────────────────────────────────────────────────── */
function Dashboard() {
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState(null);
  const [lastUpd, setLastUpd] = useState(null);
  const [tab,     setTab]     = useState("todos");
  const [q,       setQ]       = useState("");
  const [tick,    setTick]    = useState(0);
  const [cefMap,  setCefMap]  = useState({});  // CHAVE PRODUTO → QUITAÇÃO FIN CEF

  useEffect(()=>{
    let alive=true;
    setLoading(true); setErr(null);
    (async()=>{
      for(const url of FETCH_URLS){
        try{
          const res=await fetch(url);
          if(!res.ok) continue;
          const txt=await res.text();
          if(!txt.includes(",")||txt.trim().startsWith("<!")) continue;
          const result=await new Promise(resolve=>
            Papa.parse(txt,{header:true,
              transformHeader:h=>h.replace(/^\uFEFF/,"").trim(),
              skipEmptyLines:true,
              complete:({data})=>resolve(data.filter(r=>r["N"]&&!isNaN(parseInt(r["N"])))),
              error:()=>resolve([]),
            })
          );
          if(result.length>0&&alive){setRows(result);setLastUpd(new Date());setLoading(false);
            fetchCustas(alive); return;}
        }catch(e){}
      }
      if(alive){setErr("Não foi possível carregar a planilha.");setLoading(false);}
    })();

    // Busca a aba de custas projetadas detalhadas (QUITAÇÃO FIN CEF)
    async function fetchCustas(isAlive){
      for(const url of CUSTAS_URLS){
        try{
          const res=await fetch(url);
          if(!res.ok) continue;
          const txt=await res.text();
          if(!txt.includes(",")||txt.trim().startsWith("<!")) continue;
          const data=await new Promise(resolve=>
            Papa.parse(txt,{header:true,
              transformHeader:h=>h.replace(/^\uFEFF/,"").trim(),
              skipEmptyLines:true,
              complete:({data})=>resolve(data),
              error:()=>resolve([]),
            })
          );
          if(data.length>0&&isAlive){
            const map={};
            data.forEach(r=>{
              const key=norm(r["UNIDADE"]);
              if(key) map[key]=parseNum(r["QUITAÇÃO FIN CEF"]);
            });
            setCefMap(map);
            return;
          }
        }catch(e){}
      }
    }
    return()=>{alive=false;};
  },[tick]);

  const isRec = r => (r["Recompra/ Transf"]||"").toUpperCase().includes("RECOMPRA");
  const nRec  = useMemo(()=>rows.filter(isRec).length,[rows]);
  const nTrf  = useMemo(()=>rows.length-nRec,[rows,nRec]);
  const nViab = useMemo(()=>rows.filter(isViabilizarRecompra).length,[rows]);

  const byTab = useMemo(()=>{
    if(tab==="recompras")      return rows.filter(isRec);
    if(tab==="transferencias") return rows.filter(r=>!isRec(r));
    return rows;
  },[rows,tab]);

  const filtered = useMemo(()=>{
    if(!q.trim()) return byTab;
    const s=q.toLowerCase();
    return byTab.filter(r=>
      ["CHAVE PRODUTO","CLIENTE ANTIGO","CLIENTE NOVO","STATUS VENDA","STATUS REPASSE","STATUS SOLUÇÃO DE DEBITOS"]
        .some(k=>(r[k]||"").toLowerCase().includes(s))
    );
  },[byTab,q]);

  // Receita líquida por unidade: transferência deduz QUITAÇÃO FIN CEF (saldo transferido ao banco)
  const receitaLiquida = r => {
    const venda = parseNum(r["VALOR NOVA VENDA"]);
    if(isRec(r)) return venda;  // recompra recebe valor cheio
    const cef = cefMap[norm(r["CHAVE PRODUTO"])] || 0;
    return venda - cef;
  };

  const kpis = useMemo(()=>{
    const sum=k=>filtered.reduce((s,r)=>s+parseNum(r[k]),0);
    const lucros=filtered.map(r=>parseNum(r["PREVISÃO DE LUCRO"]));
    const receitaPrevista=filtered.reduce((s,r)=>s+receitaLiquida(r),0);
    const receitaReal=filtered.reduce((s,r)=>
      s + (repasseReceita(r["STATUS REPASSE"]) ? receitaLiquida(r) : 0), 0);
    return{total:filtered.length,
      totalCustas:sum("CUSTOS JÁ PAGOS"),            // Valor Gasto Total (efetivamente pago)
      receitaPrevista,                                // Receita Prevista (líquida de CEF)
      receitaReal,                                    // Receita Real (líquida, status repasse)
      totalVendas:sum("VALOR NOVA VENDA"),
      totalLucro:sum("PREVISÃO DE LUCRO"),
      positivos:lucros.filter(v=>v>0).length,negativos:lucros.filter(v=>v<0).length};
  },[filtered,cefMap]);

  // Pipeline: Débitos respeita a regra Viabilizar Recompra
  const debData=useMemo(()=>groupCount(filtered,r=>isViabilizarRecompra(r)?VIABILIZAR:catDeb(r["STATUS SOLUÇÃO DE DEBITOS"])),[filtered]);
  // Venda e Repasse: casos viabilizar saem da contagem (status em branco)
  const venData=useMemo(()=>groupCount(filtered.filter(r=>!isViabilizarRecompra(r)),r=>catVen(r["STATUS VENDA"])),[filtered]);
  const repData=useMemo(()=>groupCount(filtered.filter(r=>!isViabilizarRecompra(r)),r=>catRep(r["STATUS REPASSE"])),[filtered]);

  const tableRows = useMemo(()=>{
    if(tab!=="todos") return filtered.map(r=>({type:"data",row:r}));
    const recs=filtered.filter(isRec);
    const trfs=filtered.filter(r=>!isRec(r));
    const result=[];
    if(recs.length>0){
      result.push({type:"header",label:"Recompras",count:recs.length,isRec:true});
      recs.forEach(r=>result.push({type:"data",row:r}));
    }
    if(trfs.length>0){
      result.push({type:"header",label:"Transferências Assistidas",count:trfs.length,isRec:false});
      trfs.forEach(r=>result.push({type:"data",row:r}));
    }
    return result;
  },[filtered,tab]);

  if(loading) return (
    <div style={{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",
        justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=>(
          <div key={i} className="loading-pulse" style={{width:10,height:10,
              borderRadius:"50%",background:T.red,animationDelay:`${i*0.18}s`}}/>
        ))}
      </div>
      <div style={{fontSize:14,color:T.sub,fontWeight:500}}>Carregando base de dados...</div>
    </div>
  );

  if(err) return (
    <div style={{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",
        justifyContent:"center",padding:32}}>
      <div style={{textAlign:"center",maxWidth:500}}>
        <Logo/>
        <div style={{color:T.danger,fontSize:15,margin:"24px 0 12px",fontWeight:700}}>Erro ao carregar planilha</div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,
            padding:"16px 20px",marginBottom:20,textAlign:"left"}}>
          <p style={{color:T.txt,fontSize:12,fontWeight:700,marginBottom:10}}>Diagnóstico:</p>
          <p style={{color:T.sub,fontSize:12,lineHeight:1.9}}>
            — Planilha compartilhada como <strong style={{color:T.red}}>"Qualquer pessoa com o link"</strong> + Visualizador?<br/>
            — Abrindo via file://? Execute: <code style={{background:T.redLt,color:T.red,
              padding:"3px 10px",borderRadius:3,fontSize:11}}>python3 -m http.server 8080</code>
          </p>
        </div>
        <button onClick={()=>setTick(t=>t+1)} style={{background:T.red,color:"#fff",border:"none",
            padding:"9px 26px",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>
          Tentar novamente</button>
      </div>
    </div>
  );

  const Tab=({id,label})=>(
    <button onClick={()=>setTab(id)} style={{padding:"6px 16px",borderRadius:6,border:"none",
        cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit",
        background:tab===id?T.red:"transparent",color:tab===id?"#fff":T.sub,transition:"all 0.15s"}}>
      {label}</button>
  );

  const lastUpdStr=lastUpd?lastUpd.toLocaleString("pt-BR",
    {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):"";

  let dataIdx=0;

  return (
    <div className="fadein" style={{background:T.bg,minHeight:"100vh",
        fontFamily:"'Segoe UI',Inter,Arial,sans-serif",color:T.txt}}>

      {/* HEADER */}
      <header style={{background:T.card,borderBottom:`1px solid ${T.border}`,padding:"0 28px",
          height:64,display:"flex",justifyContent:"space-between",alignItems:"center",
          position:"sticky",top:0,zIndex:100,
          boxShadow:"0 1px 0 0 #9E1B1B, 0 4px 16px rgba(158,27,27,0.06)"}}>

        {/* Esquerda: logo + título */}
        <div style={{display:"flex",alignItems:"center",gap:18}}>
          <Logo/>
          <div style={{width:1,height:28,background:T.border}}/>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:T.txt,letterSpacing:"-0.01em",lineHeight:1.2}}>
              Recompras &amp; Transferências
            </div>
            <div style={{fontSize:10.5,color:T.sub,fontWeight:500,letterSpacing:"0.02em",marginTop:1}}>
              Painel executivo · Pipeline consolidado
            </div>
          </div>
        </div>

        {/* Direita: status de atualização + ação */}
        <div style={{display:"flex",alignItems:"center",gap:18}}>
          {lastUpd && (
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:T.green,
                  boxShadow:`0 0 0 3px ${T.green}22`,flexShrink:0}}/>
              <div style={{textAlign:"right",lineHeight:1.25}}>
                <div style={{fontSize:9,color:T.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Atualizado
                </div>
                <div style={{fontSize:11,color:T.txt,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>
                  {lastUpdStr}
                </div>
              </div>
            </div>
          )}
          <button onClick={()=>setTick(t=>t+1)}
            style={{display:"flex",alignItems:"center",gap:7,
              background:T.red,color:"#fff",border:"none",borderRadius:7,
              padding:"8px 18px",cursor:"pointer",fontSize:12.5,fontWeight:700,
              fontFamily:"inherit",letterSpacing:"0.01em",
              boxShadow:`0 2px 8px ${T.red}33`,transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=T.redDk;e.currentTarget.style.boxShadow=`0 3px 12px ${T.red}44`;}}
            onMouseLeave={e=>{e.currentTarget.style.background=T.red;e.currentTarget.style.boxShadow=`0 2px 8px ${T.red}33`;}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff"
              strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
            Atualizar
          </button>
        </div>
      </header>

      <main style={{padding:"24px 32px",maxWidth:1440,margin:"0 auto"}}>

        {/* TABS */}
        <div style={{display:"flex",gap:3,background:T.card,border:`1px solid ${T.border}`,
            padding:4,borderRadius:8,width:"fit-content",marginBottom:20,boxShadow:"0 1px 3px #00000008"}}>
          <Tab id="todos"          label={`Todos  (${rows.length})`}/>
          <Tab id="recompras"      label={`Recompras  (${nRec})`}/>
          <Tab id="transferencias" label={`Transferências  (${nTrf})`}/>
        </div>

        {/* KPI BANNER */}
        <KPIBanner kpis={kpis} nRec={nRec} nTrf={nTrf} total={rows.length}/>

        {/* PIPELINE */}
        <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
          <PipelineCard title="Solução de Débitos" data={debData} map={C.deb}/>
          <PipelineCard title="Status de Venda"    data={venData} map={C.ven}/>
          <PipelineCard title="Status Repasse"     data={repData} map={C.rep}/>
        </div>

        {/* TABELA */}
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,
            overflow:"hidden",boxShadow:"0 1px 6px #00000010"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"11px 18px",background:T.red,borderBottom:`2px solid ${T.redDk}`}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em"}}>
              Detalhamento por Unidade
            </span>
            <input value={q} onChange={e=>setQ(e.target.value)}
              placeholder="Buscar unidade, cliente, status..."
              style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",
                borderRadius:5,padding:"6px 13px",color:"#fff",fontSize:12,width:280,
                outline:"none",fontFamily:"inherit"}}/>
          </div>

          <div style={{overflowX:"auto",maxHeight:540,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:880,fontSize:12}}>
              <thead>
                <tr style={{position:"sticky",top:0,zIndex:2}}>
                  {["#","Tipo","Unidade","Cliente","Débitos","Venda","Repasse"].map((label,i)=>(
                    <th key={i} style={{padding:"10px 14px",background:T.red,color:"#fff",
                        fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",
                        textAlign:"left",whiteSpace:"nowrap",borderRight:`1px solid ${T.redDk}80`}}>
                      {label}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {tableRows.map((item,idx)=>{
                  if(item.type==="header"){
                    return <SectionRow key={`h${idx}`} label={item.label} count={item.count} isRec={item.isRec}/>;
                  }
                  const r=item.row;
                  const rec=isRec(r);
                  const viab=isViabilizarRecompra(r);
                  dataIdx++;
                  const rowBg=viab?"#fdf0f0":(dataIdx%2===0?T.zebra:"#fff");
                  return (
                    <tr key={idx} style={{background:rowBg,borderBottom:`1px solid ${T.border}`}}
                      onMouseEnter={e=>e.currentTarget.style.background="#fdf4f4"}
                      onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                      <td style={{padding:"9px 14px",color:T.sub,fontVariantNumeric:"tabular-nums",
                          borderRight:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>{r["N"]}</td>
                      <td style={{padding:"9px 14px",borderRight:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>
                        <span style={{background:rec?T.red+"18":T.purple+"18",
                            color:rec?T.red:T.purple,
                            border:`1px solid ${rec?T.red:T.purple}44`,
                            padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:700,
                            textTransform:"uppercase",letterSpacing:"0.04em"}}>
                          {rec?"Recompra":"Transf."}
                        </span>
                      </td>
                      <td style={{padding:"9px 14px",fontWeight:700,color:T.txt,
                          borderRight:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>
                        {r["CHAVE PRODUTO"]}
                        {diasHabitse(r)!==null && (
                          <span style={{marginLeft:8,color:T.blue,fontSize:10,fontWeight:600,
                              verticalAlign:"middle"}}>
                            habite-se {diasHabitse(r)}d
                          </span>
                        )}
                      </td>
                      <td style={{padding:"9px 14px",color:T.sub,maxWidth:160,overflow:"hidden",
                          textOverflow:"ellipsis",whiteSpace:"nowrap",borderRight:`1px solid ${T.border}`}}>
                        {r["CLIENTE NOVO"]||r["CLIENTE ANTIGO"]||"—"}
                      </td>
                      <td style={{padding:"9px 14px",borderRight:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>
                        {viab
                          ? <Badge text={VIABILIZAR} map={C.deb}/>
                          : <Badge text={catDeb(r["STATUS SOLUÇÃO DE DEBITOS"])} map={C.deb}/>}
                      </td>
                      <td style={{padding:"9px 14px",borderRight:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>
                        {viab ? <span style={{color:T.sub}}>—</span> : <Badge text={catVen(r["STATUS VENDA"])} map={C.ven}/>}
                      </td>
                      <td style={{padding:"9px 14px",color:T.sub,maxWidth:240,overflow:"hidden",
                          textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                        title={viab?"":(r["STATUS REPASSE"]||"")}>
                        {viab ? "—" : (r["STATUS REPASSE"]||"—")}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{padding:"9px 18px",borderTop:`1px solid ${T.border}`,
              display:"flex",justifyContent:"space-between",background:T.zebra,color:T.sub,fontSize:11}}>
            <span>{filtered.length} de {rows.length} registros</span>
            {q&&<span style={{color:T.red,fontWeight:600}}>{filtered.length} resultado(s) para "{q}"</span>}
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:28,color:T.sub,fontSize:10,
            letterSpacing:"0.04em",textTransform:"uppercase"}}>
          Metrocasa Construtora &nbsp;·&nbsp; Recompras &amp; Transferências &nbsp;·&nbsp; Dados via Google Sheets
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
