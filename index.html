<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrocasa · Dashboard Recompras & Transferências</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #060F1E; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #060F1E; }
    ::-webkit-scrollbar-thumb { background: #1A3660; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #2A5096; }
    * { scrollbar-width: thin; scrollbar-color: #1A3660 #060F1E; }
    input::placeholder { color: #6B85AA; opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1.2s linear infinite; }
    @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fadein { animation: fadein 0.4s ease both; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ── CONFIG ─────────────────────────────────────────────────────────────── */
const SHEET_ID  = "1h_m785gwSe6ViVHOZX0IFUZItL2N1wHsmwuYH3BBXIU";
const DIRECT_1  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=BASE%20GERAL`;
const DIRECT_2  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const FETCH_URLS = [
  DIRECT_1,
  DIRECT_2,
  `https://corsproxy.io/?url=${encodeURIComponent(DIRECT_1)}`,
  `https://api.allorigins.win/raw?url=${encodeURIComponent(DIRECT_1)}`,
  `https://api.allorigins.win/raw?url=${encodeURIComponent(DIRECT_2)}`,
];

/* ── TOKENS ─────────────────────────────────────────────────────────────── */
const T = {
  bgBase:  "#060F1E",
  bgSurf:  "#0D1B33",
  bgCard:  "#112041",
  border:  "#1A3660",
  txt:     "#E8F0FF",
  txtSub:  "#6B85AA",
  accent:  "#00A3FF",
  success: "#22D37C",
  danger:  "#FF3D57",
  warn:    "#F5A623",
  purple:  "#8B5CF6",
  cyan:    "#06B6D4",
};

/* ── HELPERS ─────────────────────────────────────────────────────────────── */
const parseNum = (v) => {
  if (v == null) return 0;
  const s = String(v).replace(/R\$\s*/g,"").replace(/\s+/g,"").replace(/\./g,"").replace(",",".");
  const n = parseFloat(s.trim());
  return isNaN(n) ? 0 : n;
};

const fmtBRL = (n) => {
  const abs = Math.abs(n), sign = n < 0 ? "-" : "";
  if (abs >= 1_000_000) return `${sign}R$ ${(abs/1_000_000).toFixed(1).replace(".",",")}M`;
  if (abs >= 1_000)     return `${sign}R$ ${Math.round(abs/1_000).toLocaleString("pt-BR")}K`;
  return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}).format(n);
};

const pct = (a,b) => b===0 ? 0 : Math.round((a/b)*100);

/* ── STATUS CATEGORIZERS ─────────────────────────────────────────────────── */
const catDeb = (s="") => {
  const l = s.toLowerCase();
  if (l.includes("registrado")||l.includes("averbado")) return "Registrado / Averbado";
  if (l.includes("registro"))  return "Em Registro";
  if (l.includes("procura"))   return "Procuração Assinada";
  return s.trim() || "Sem Info";
};

const catVen = (s="") => {
  const u = s.toUpperCase();
  if (!s.trim()) return "Sem Status";
  if (u.includes("SV - VALIDADO")||(u.includes("VENDA")&&u.includes("VALIDADO"))) return "SV Validado";
  if (u.includes("ESTEIRA"))     return "Esteira Crédito";
  if (u.includes("DESIST"))      return "Desistência";
  if (u.includes("PROCESSO JUDICIAL")) return "Proc. Judicial";
  if (u.includes("TRANSF")&&u.includes("LIBER")) return "Transf. p/ Negoc.";
  if (u.includes("ANALISANDO"))  return "Analisando Contrato";
  if (u.includes("CCA"))         return "Em Análise CCA";
  if (u.includes("ESTOQUE")||u.includes("PRONTOS")) return "Estoque";
  return "Outros";
};

const catRep = (s="") => {
  const u = s.toUpperCase();
  if (!s.trim()) return "Pendente";
  if (u.includes("FINALIZADO")||u.includes("GARANTIA")) return "Finalizado / Garantia";
  if (u.includes("VENDA DIRETA"))  return "Venda Direta";
  if (u.includes("DISTRATO")&&(u.includes("CONCLU")||u.includes("CONCLUÍ"))) return "Distrato Concluído";
  if (u.includes("DISTRATO"))      return "Em Distrato";
  if (u.includes("INCONFORME"))    return "Inconforme";
  if (u.includes("ASSINADO")||u.includes("CARTORI")) return "Assinado / Cartório";
  if (u.includes("CONFORME"))      return "Em Conformidade";
  if (u.includes("SUBIR"))         return "Subir p/ CEHOP";
  if (u.includes("NEGOCI"))        return "Em Negociação";
  if (u.includes("REGISTRADO"))    return "Registrado";
  if (u.includes("ANALISE")||u.includes("ANÁLISE")||u.includes("AGUARD")||u.includes("BRADESCO")||u.includes("CEHOP")) return "Em Análise";
  if (u.includes("REAVALIAR"))     return "Reavaliar";
  return "Pendente";
};

/* ── COLOR MAPS ──────────────────────────────────────────────────────────── */
const C = {
  deb: {
    "Registrado / Averbado": T.success,
    "Em Registro":           T.accent,
    "Procuração Assinada":   T.purple,
    "Sem Info":              T.txtSub,
  },
  ven: {
    "SV Validado":          T.success,
    "Esteira Crédito":      T.accent,
    "Desistência":          T.danger,
    "Proc. Judicial":       "#dc2626",
    "Transf. p/ Negoc.":   T.cyan,
    "Analisando Contrato":  T.purple,
    "Em Análise CCA":       T.warn,
    "Estoque":              T.txtSub,
    "Outros":               "#475569",
    "Sem Status":           "#374151",
  },
  rep: {
    "Finalizado / Garantia": T.success,
    "Venda Direta":          "#10b981",
    "Distrato Concluído":    T.warn,
    "Em Distrato":           T.danger,
    "Inconforme":            "#f43f5e",
    "Assinado / Cartório":   T.accent,
    "Em Conformidade":       T.purple,
    "Subir p/ CEHOP":        "#6366f1",
    "Em Negociação":         T.warn,
    "Registrado":            T.cyan,
    "Em Análise":            "#0ea5e9",
    "Reavaliar":             "#fb923c",
    "Pendente":              T.txtSub,
  },
};

/* ── UTILS ───────────────────────────────────────────────────────────────── */
const groupCount = (arr, fn) => {
  const m = {};
  arr.forEach(r => { const k=fn(r); m[k]=(m[k]||0)+1; });
  return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
};

/* ── ATOMS ───────────────────────────────────────────────────────────────── */
function Badge({ text, map }) {
  const c = map[text] || T.txtSub;
  return (
    <span style={{
      display:"inline-block", background:c+"1A", color:c,
      border:`1px solid ${c}44`, borderRadius:4,
      padding:"2px 8px", fontSize:11, fontWeight:700,
      whiteSpace:"nowrap", letterSpacing:"0.01em",
    }}>{text}</span>
  );
}

function KPICard({ label, value, sub, accent=T.txt, bg }) {
  return (
    <div style={{
      background: bg||T.bgCard, border:`1px solid ${T.border}`,
      borderRadius:10, padding:"18px 22px", flex:1, minWidth:145,
    }}>
      <p style={{margin:"0 0 8px",color:T.txtSub,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</p>
      <p style={{margin:0,color:accent,fontSize:24,fontWeight:800,lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{value}</p>
      {sub && <p style={{margin:"6px 0 0",color:T.txtSub,fontSize:11}}>{sub}</p>}
    </div>
  );
}

function PipelineCard({ title, data, map }) {
  const total = data.reduce((s,d)=>s+d.value,0);
  return (
    <div style={{
      background:T.bgCard, border:`1px solid ${T.border}`,
      borderRadius:10, padding:"20px 24px", flex:1, minWidth:270,
    }}>
      <p style={{margin:"0 0 18px",color:T.txt,fontSize:13,fontWeight:700}}>{title}</p>
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {data.map(({name,value}) => {
          const p = pct(value,total);
          const c = map[name] || T.txtSub;
          return (
            <div key={name}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                <span style={{color:"#CBD5E1",fontSize:12}}>{name}</span>
                <span style={{color:c,fontSize:12,fontWeight:800,fontVariantNumeric:"tabular-nums"}}>
                  {value}&thinsp;<span style={{color:T.txtSub,fontWeight:400}}>({p}%)</span>
                </span>
              </div>
              <div style={{height:4,background:T.bgSurf,borderRadius:99,overflow:"hidden"}}>
                <div style={{
                  height:"100%", width:`${p}%`,
                  background:`linear-gradient(90deg,${c}99,${c})`,
                  borderRadius:99, transition:"width 0.6s cubic-bezier(.4,0,.2,1)",
                }}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ExposureBar({ totalCustas, totalVendas, totalLucro }) {
  const base    = Math.max(totalCustas, totalVendas) || 1;
  const pctRec  = Math.min(100,(totalVendas/base)*100);
  const isProfit = totalLucro >= 0;
  return (
    <div style={{
      background:T.bgCard, border:`1px solid ${T.border}`,
      borderRadius:10, padding:"18px 28px", marginBottom:24,
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{color:T.txtSub,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>
          Exposição de Capital · Portfólio
        </span>
        <span style={{fontSize:13,fontWeight:800,color:isProfit?T.success:T.danger,fontVariantNumeric:"tabular-nums"}}>
          {isProfit?"▲":"▼"} {fmtBRL(Math.abs(totalLucro))} {isProfit?"lucro previsto":"exposição a prejuízo"}
        </span>
      </div>
      <div style={{height:14,background:T.bgSurf,borderRadius:99,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",inset:0,background:isProfit?T.danger+"33":T.danger+"55",width:"100%"}}/>
        <div style={{
          position:"absolute",top:0,left:0,height:"100%",
          width:`${pctRec}%`,
          background:`linear-gradient(90deg,${T.success}88,${T.success})`,
          borderRadius:"99px 0 0 99px",
          transition:"width 0.8s cubic-bezier(.4,0,.2,1)",
        }}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
        <span style={{color:T.success,fontSize:11,fontWeight:600}}>▶ Retorno previsto: {fmtBRL(totalVendas)}</span>
        <span style={{color:T.danger, fontSize:11,fontWeight:600}}>Capital investido: {fmtBRL(totalCustas)}</span>
      </div>
    </div>
  );
}

/* ── MAIN ────────────────────────────────────────────────────────────────── */
function Dashboard() {
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState(null);
  const [lastUpd, setLastUpd] = useState(null);
  const [tab,     setTab]     = useState("todos");
  const [q,       setQ]       = useState("");
  const [tick,    setTick]    = useState(0);

  useEffect(() => {
    let alive = true;
    setLoading(true);
    setErr(null);

    (async () => {
      for (const url of FETCH_URLS) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;
          const txt = await res.text();
          if (!txt.includes(",") || txt.trim().startsWith("<!")) continue;

          const result = await new Promise(resolve => {
            Papa.parse(txt, {
              header: true,
              transformHeader: h => h.replace(/^\uFEFF/,"").trim(),
              skipEmptyLines: true,
              complete: ({data}) => resolve(data.filter(r => r["N"] && !isNaN(parseInt(r["N"])))),
              error: () => resolve([]),
            });
          });

          if (result.length > 0 && alive) {
            setRows(result);
            setLastUpd(new Date());
            setLoading(false);
            return;
          }
        } catch(e) { /* try next */ }
      }
      if (alive) {
        setErr("Não foi possível carregar a planilha. Certifique-se de que o acesso está configurado como 'qualquer pessoa com o link pode ver'.");
        setLoading(false);
      }
    })();

    return () => { alive = false; };
  }, [tick]);

  const nRec = useMemo(() => rows.filter(r=>(r["Recompra/ Transf"]||"").toUpperCase().includes("RECOMPRA")).length, [rows]);
  const nTrf = useMemo(() => rows.length - nRec, [rows, nRec]);

  const byTab = useMemo(() => {
    if (tab==="recompras")      return rows.filter(r=>(r["Recompra/ Transf"]||"").toUpperCase().includes("RECOMPRA"));
    if (tab==="transferencias") return rows.filter(r=>(r["Recompra/ Transf"]||"").toUpperCase().includes("TRANSFER"));
    return rows;
  }, [rows, tab]);

  const filtered = useMemo(() => {
    if (!q.trim()) return byTab;
    const s = q.toLowerCase();
    return byTab.filter(r =>
      ["CHAVE PRODUTO","CLIENTE ANTIGO","CLIENTE NOVO","STATUS VENDA","STATUS REPASSE","STATUS SOLUÇÃO DE DEBITOS"]
        .some(k => (r[k]||"").toLowerCase().includes(s))
    );
  }, [byTab, q]);

  const kpis = useMemo(() => {
    const sum = k => filtered.reduce((s,r)=>s+parseNum(r[k]),0);
    const lucros = filtered.map(r=>parseNum(r["PREVISÃO DE LUCRO"]));
    return {
      total:       filtered.length,
      totalVendas: sum("VALOR NOVA VENDA"),
      totalLucro:  sum("PREVISÃO DE LUCRO"),
      totalCustas: sum("PREVISÃO TOTAL CUSTAS"),
      positivos:   lucros.filter(v=>v>0).length,
      negativos:   lucros.filter(v=>v<0).length,
    };
  }, [filtered]);

  const debData = useMemo(() => groupCount(filtered, r=>catDeb(r["STATUS SOLUÇÃO DE DEBITOS"])), [filtered]);
  const venData = useMemo(() => groupCount(filtered, r=>catVen(r["STATUS VENDA"])), [filtered]);
  const repData = useMemo(() => groupCount(filtered, r=>catRep(r["STATUS REPASSE"])), [filtered]);

  const alerts = useMemo(() => filtered.filter(r => {
    const rep = catRep(r["STATUS REPASSE"]);
    return ["Em Distrato","Inconforme","Reavaliar"].includes(rep) || parseNum(r["PREVISÃO DE LUCRO"]) < -15000;
  }), [filtered]);

  /* loading */
  if (loading) return (
    <div style={{background:T.bgBase,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Inter,sans-serif"}}>
      <div style={{textAlign:"center",color:T.txtSub}}>
        <div className="spin" style={{fontSize:36,color:T.accent,display:"block",marginBottom:14}}>◌</div>
        <div style={{fontSize:15,color:T.txt}}>Carregando base de dados...</div>
        <div style={{fontSize:12,marginTop:6}}>Conectando ao Google Sheets</div>
      </div>
    </div>
  );

  /* error */
  if (err) return (
    <div style={{background:T.bgBase,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Inter,sans-serif",padding:32}}>
      <div style={{textAlign:"center",maxWidth:520}}>
        <div style={{color:T.danger,fontSize:18,marginBottom:16,fontWeight:800}}>⚠ Erro ao carregar planilha</div>
        <div style={{color:T.txtSub,fontSize:13,marginBottom:24,lineHeight:1.7}}>{err}</div>

        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px 20px",marginBottom:24,textAlign:"left"}}>
          <p style={{color:T.txt,fontSize:12,fontWeight:700,marginBottom:10}}>Checklist de diagnóstico:</p>
          <p style={{color:T.txtSub,fontSize:12,lineHeight:1.8}}>
            ① A planilha está compartilhada como <strong style={{color:T.warn}}>"Qualquer pessoa com o link"</strong> com permissão de <strong style={{color:T.warn}}>Visualizador</strong>?<br/>
            ② Está abrindo o arquivo HTML diretamente pelo explorer (file://)? Isso bloqueia requisições externas.<br/>
            ③ Se sim, abra o terminal na pasta do arquivo e rode:<br/>
            <code style={{background:"#0a0f1a",color:T.accent,padding:"4px 10px",borderRadius:4,display:"inline-block",marginTop:6,fontSize:11}}>
              python3 -m http.server 8080
            </code><br/>
            Depois acesse <code style={{color:T.accent,fontSize:11}}>http://localhost:8080</code> no browser.
          </p>
        </div>

        <button onClick={()=>setTick(t=>t+1)} style={{
          background:T.accent,color:"#fff",border:"none",
          padding:"10px 28px",borderRadius:8,cursor:"pointer",
          fontFamily:"inherit",fontSize:14,fontWeight:700,
        }}>↻ Tentar Novamente</button>
      </div>
    </div>
  );

  /* TabBtn */
  const Tab = ({id, label}) => (
    <button onClick={()=>setTab(id)} style={{
      padding:"7px 18px", borderRadius:7, border:"none", cursor:"pointer",
      fontWeight:700, fontSize:13, fontFamily:"inherit",
      background: tab===id ? T.accent : "transparent",
      color:      tab===id ? "#fff"   : T.txtSub,
      transition: "all 0.2s",
    }}>{label}</button>
  );

  return (
    <div className="fadein" style={{background:T.bgBase,minHeight:"100vh",fontFamily:"Inter,-apple-system,sans-serif",color:T.txt}}>

      {/* ── HEADER ── */}
      <header style={{
        background:T.bgSurf, borderBottom:`1px solid ${T.border}`,
        padding:"0 32px", display:"flex", justifyContent:"space-between",
        alignItems:"center", height:58,
        position:"sticky", top:0, zIndex:100,
        boxShadow:"0 1px 20px #00000044",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:20}}>
          <span style={{
            fontSize:17, fontWeight:900, letterSpacing:"-0.03em",
            background:`linear-gradient(90deg,${T.txt},${T.accent})`,
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
          }}>METROCASA</span>
          <div style={{width:1,height:22,background:T.border}}/>
          <span style={{color:T.txtSub,fontSize:12,fontWeight:600}}>Recompras &amp; Transferências</span>
        </div>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          {lastUpd && (
            <span style={{color:T.txtSub,fontSize:12}}>
              Atualizado às {lastUpd.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
            </span>
          )}
          <button onClick={()=>setTick(t=>t+1)} style={{
            background:T.accent+"22", color:T.accent,
            border:`1px solid ${T.accent}55`, borderRadius:7,
            padding:"6px 16px", cursor:"pointer",
            fontSize:13, fontWeight:700, fontFamily:"inherit",
          }}>↻ Atualizar</button>
        </div>
      </header>

      <main style={{padding:"28px 32px",maxWidth:1440,margin:"0 auto"}}>

        {/* ── TABS ── */}
        <div style={{
          display:"flex", gap:4, background:T.bgCard,
          padding:4, borderRadius:9, width:"fit-content", marginBottom:24,
        }}>
          <Tab id="todos"          label={`Todos (${rows.length})`}/>
          <Tab id="recompras"      label={`Recompras (${nRec})`}/>
          <Tab id="transferencias" label={`Transferências (${nTrf})`}/>
        </div>

        {/* ── EXPOSURE BAR ── */}
        <ExposureBar
          totalCustas={kpis.totalCustas}
          totalVendas={kpis.totalVendas}
          totalLucro={kpis.totalLucro}
        />

        {/* ── KPIs ── */}
        <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>
          <KPICard label="Total de Casos"       value={kpis.total}              sub={`${nRec} recompras · ${nTrf} transferências`}/>
          <KPICard label="Volume de Vendas"     value={fmtBRL(kpis.totalVendas)} accent={T.txt}/>
          <KPICard label="Lucro Previsto"       value={fmtBRL(kpis.totalLucro)} accent={kpis.totalLucro>=0?T.success:T.danger} sub={`${kpis.positivos} c/ lucro · ${kpis.negativos} c/ prejuízo`}/>
          <KPICard label="Total Custas Prev."   value={fmtBRL(kpis.totalCustas)} accent={T.warn}/>
          <KPICard label="Requer Atenção"       value={alerts.length} accent={alerts.length>0?T.danger:T.success} sub="Distrato · Inconforme · Prejuízo > 15K" bg={alerts.length>0?"#3D0A10":T.bgCard}/>
        </div>

        {/* ── ALERT STRIP ── */}
        {alerts.length > 0 && (
          <div style={{
            background:"#3D0A10", border:`1px solid ${T.danger}44`,
            borderLeft:`4px solid ${T.danger}`, borderRadius:10,
            padding:"12px 20px", marginBottom:24,
            display:"flex", gap:10, alignItems:"center", flexWrap:"wrap",
          }}>
            <span style={{color:"#FCA5A5",fontWeight:800,fontSize:13,flexShrink:0}}>
              ⚠ {alerts.length} {alerts.length===1?"caso requer atenção":"casos requerem atenção"}:
            </span>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {alerts.slice(0,12).map((r,i) => (
                <span key={i} style={{
                  background:T.danger+"22", color:"#FCA5A5",
                  border:`1px solid ${T.danger}33`,
                  borderRadius:4, padding:"2px 8px",
                  fontSize:11, fontWeight:700,
                }}>{r["CHAVE PRODUTO"]}</span>
              ))}
              {alerts.length > 12 && (
                <span style={{color:T.danger,fontSize:12,fontWeight:600}}>+{alerts.length-12} mais</span>
              )}
            </div>
          </div>
        )}

        {/* ── PIPELINE CARDS ── */}
        <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>
          <PipelineCard title="📋  Solução de Débitos" data={debData} map={C.deb}/>
          <PipelineCard title="🏠  Status Venda"        data={venData} map={C.ven}/>
          <PipelineCard title="📤  Status Repasse"      data={repData} map={C.rep}/>
        </div>

        {/* ── TABLE ── */}
        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
          <div style={{
            padding:"14px 20px", borderBottom:`1px solid ${T.border}`,
            display:"flex", justifyContent:"space-between", alignItems:"center",
          }}>
            <span style={{fontWeight:800,fontSize:14}}>Detalhamento por Unidade</span>
            <input
              value={q} onChange={e=>setQ(e.target.value)}
              placeholder="🔍  Buscar unidade, cliente, status..."
              style={{
                background:T.bgSurf, border:`1px solid ${T.border}`,
                borderRadius:7, padding:"7px 14px", color:T.txt,
                fontSize:13, width:310, outline:"none", fontFamily:"inherit",
              }}
            />
          </div>

          <div style={{overflowX:"auto",maxHeight:520,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:980,fontSize:12}}>
              <thead>
                <tr style={{background:T.bgBase,position:"sticky",top:0,zIndex:2}}>
                  {["#","Tipo","Unidade","Cliente","Status Débitos","Status Venda","Status Repasse","Lucro Prev."].map(h=>(
                    <th key={h} style={{
                      padding:"10px 14px", textAlign:"left",
                      color:T.txtSub, fontSize:11, fontWeight:700,
                      textTransform:"uppercase", letterSpacing:"0.06em",
                      borderBottom:`1px solid ${T.border}`, whiteSpace:"nowrap",
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((r,i) => {
                  const lucro   = parseNum(r["PREVISÃO DE LUCRO"]);
                  const isRec   = (r["Recompra/ Transf"]||"").toUpperCase().includes("RECOMPRA");
                  const isAlert = alerts.includes(r);
                  const rowBg   = isAlert ? "#3D0A1022" : i%2===0 ? "transparent" : "#FFFFFF04";
                  return (
                    <tr key={i}
                      style={{background:rowBg,borderBottom:`1px solid ${T.bgSurf}`,cursor:"default"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#1A3A5C"}
                      onMouseLeave={e=>e.currentTarget.style.background=rowBg}
                    >
                      <td style={{padding:"9px 14px",color:T.txtSub,fontVariantNumeric:"tabular-nums"}}>{r["N"]}</td>
                      <td style={{padding:"9px 14px"}}>
                        <span style={{
                          background: isRec ? T.accent+"22" : T.purple+"22",
                          color:      isRec ? T.accent       : T.purple,
                          border:    `1px solid ${isRec?T.accent:T.purple}44`,
                          padding:"2px 8px", borderRadius:4, fontSize:11, fontWeight:700,
                        }}>{isRec?"Recompra":"Transf."}</span>
                      </td>
                      <td style={{padding:"9px 14px",fontWeight:700,color:T.txt}}>{r["CHAVE PRODUTO"]}</td>
                      <td style={{padding:"9px 14px",color:T.txtSub,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {r["CLIENTE NOVO"]||r["CLIENTE ANTIGO"]||"—"}
                      </td>
                      <td style={{padding:"9px 14px"}}><Badge text={catDeb(r["STATUS SOLUÇÃO DE DEBITOS"])} map={C.deb}/></td>
                      <td style={{padding:"9px 14px"}}><Badge text={catVen(r["STATUS VENDA"])} map={C.ven}/></td>
                      <td style={{padding:"9px 14px",color:T.txtSub,maxWidth:230,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                          title={r["STATUS REPASSE"]||""}>
                        {r["STATUS REPASSE"]||"—"}
                      </td>
                      <td style={{padding:"9px 14px",fontWeight:800,color:lucro>=0?T.success:T.danger,fontVariantNumeric:"tabular-nums"}}>
                        {fmtBRL(lucro)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{
            padding:"10px 20px", borderTop:`1px solid ${T.border}`,
            display:"flex", justifyContent:"space-between",
            color:T.txtSub, fontSize:12,
          }}>
            <span>{filtered.length} de {rows.length} registros</span>
            {q && <span style={{color:T.accent}}>{filtered.length} resultado(s) para "{q}"</span>}
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
